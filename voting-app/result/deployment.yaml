apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
  namespace: voting-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
        - name: result
          image: dockersamples/examplevotingapp_result
          ports:
            - containerPort: 80
          env:
          - name: DATABASE_HOST
            value: "db"
          - name: DATABASE_USER
            value: "postgres"
          - name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: postgres-password

---
apiVersion: v1
kind: Service
metadata:
  name: result
  namespace: voting-dev
spec:
  type: NodePort
  selector:
    app: result
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 31001