apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-app
  namespace: voting-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voting-app
  template:
    metadata:
      labels:
        app: voting-app
    spec:
      containers:
      - name: voting-app
        image: dockersamples/examplevotingapp_vote
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: voting-app
  namespace: voting-dev
spec:
  type: NodePort
  selector:
    app: voting-app  # Send traffic to pods with this label
  ports:
  - port: 80
    targetPort: 80
    nodePort: 31000 

      