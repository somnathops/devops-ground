apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: voting-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis  # Deployment looks for pods with this label
  template:
    metadata:
      labels:
        app: redis  # Pods get this label when created
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379

---

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: voting-dev
spec:
  selector:
    app: redis  # Send traffic to pods with this label
  ports:
  - port: 6379
    targetPort: 6379