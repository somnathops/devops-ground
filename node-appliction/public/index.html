<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Docker App</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background: #f0f4f8;
        }

        h1 {
            color: #2d3748;
        }

        button {
            padding: 10px 20px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #2b6cb0;
        }
    </style>
</head>

<body>
    <h1>My Dockerized App</h1>
    <p>Running inside a Docker container!</p>
    <button onclick="fetchHello()">Call API</button>
    <div id="result"></div>
    <script>
        async function fetchHello() {
            const res = await fetch('/api/hello');
            const data = await res.json();
            document.getElementById('result').textContent = data.message;
        }
    </script>
</body>

</html>
