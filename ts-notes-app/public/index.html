<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.4rem; font-weight: 600; }

    .container {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .form-card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      margin-bottom: 32px;
    }

    .form-card h2 { margin-bottom: 16px; font-size: 1rem; color: #4f46e5; }

    input, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 12px;
      font-family: inherit;
    }

    textarea { height: 90px; resize: vertical; }

    input:focus, textarea:focus {
      outline: none;
      border-color: #4f46e5;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-secondary { background: #e5e7eb; color: #333; }
    .btn-secondary:hover { background: #d1d5db; }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .note-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .note-card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #1e1b4b;
    }

    .note-card p {
      font-size: 0.88rem;
      color: #555;
      flex: 1;
      line-height: 1.5;
    }

    .note-card .meta {
      font-size: 0.75rem;
      color: #aaa;
    }

    .note-card .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .empty {
      text-align: center;
      color: #aaa;
      margin-top: 60px;
      font-size: 1rem;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 10;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 10px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .modal h2 { margin-bottom: 16px; font-size: 1.1rem; color: #4f46e5; }
    .modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  </style>
</head>
<body>

<header>
  <h1>Notes App</h1>
  <span id="note-count" style="font-size:0.85rem; opacity:0.8">0 notes</span>
</header>

<div class="container">
  <div class="form-card">
    <h2>New Note</h2>
    <input type="text" id="new-title" placeholder="Title" />
    <textarea id="new-content" placeholder="Write your note..."></textarea>
    <button class="btn btn-primary" onclick="createNote()">Add Note</button>
  </div>

  <div id="notes-container" class="notes-grid"></div>
  <p class="empty" id="empty-msg" style="display:none">No notes yet. Create one above!</p>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>Edit Note</h2>
    <input type="text" id="edit-title" placeholder="Title" />
    <textarea id="edit-content" placeholder="Content"></textarea>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
  let editingId = null;

  async function loadNotes() {
    const res = await fetch('/notes');
    const notes = await res.json();
    const container = document.getElementById('notes-container');
    const empty = document.getElementById('empty-msg');
    const count = document.getElementById('note-count');

    count.textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;

    if (notes.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    container.innerHTML = notes.map(note => `
      <div class="note-card">
        <h3>${escapeHtml(note.title)}</h3>
        <p>${escapeHtml(note.content)}</p>
        <div class="meta">Updated: ${new Date(note.updatedAt).toLocaleString()}</div>
        <div class="actions">
          <button class="btn btn-secondary" onclick="openEdit('${note.id}', \`${escapeHtml(note.title)}\`, \`${escapeHtml(note.content)}\`)">Edit</button>
          <button class="btn btn-danger" onclick="deleteNote('${note.id}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function createNote() {
    const title = document.getElementById('new-title').value.trim();
    const content = document.getElementById('new-content').value.trim();
    if (!title || !content) return alert('Title and content are required');

    await fetch('/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content })
    });

    document.getElementById('new-title').value = '';
    document.getElementById('new-content').value = '';
    loadNotes();
  }

  async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    await fetch(`/notes/${id}`, { method: 'DELETE' });
    loadNotes();
  }

  function openEdit(id, title, content) {
    editingId = id;
    document.getElementById('edit-title').value = title;
    document.getElementById('edit-content').value = content;
    document.getElementById('edit-modal').classList.add('active');
  }

  function closeModal() {
    editingId = null;
    document.getElementById('edit-modal').classList.remove('active');
  }

  async function saveEdit() {
    const title = document.getElementById('edit-title').value.trim();
    const content = document.getElementById('edit-content').value.trim();
    if (!title || !content) return alert('Title and content are required');

    await fetch(`/notes/${editingId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content })
    });

    closeModal();
    loadNotes();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  loadNotes();
</script>
</body>
</html>
